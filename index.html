<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 نظام تتبع كامل</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; font-size: 2.5em; }
        
        .stats { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            margin-bottom: 30px; 
        }
        .stat { 
            background: rgba(255,255,255,0.1); 
            padding: 20px; 
            border-radius: 15px; 
            text-align: center; 
            backdrop-filter: blur(10px);
        }
        .stat h3 { margin-bottom: 10px; font-size: 1.1em; }
        .stat-value { font-size: 2.5em; font-weight: bold; color: #00d4ff; }
        
        .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .chart-box { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; }
        
        .visitors { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; }
        .visitor { padding: 10px; margin: 10px 0; background: rgba(255,255,255,0.05); border-radius: 8px; }
        
        @media (max-width: 768px) {
            .charts { grid-template-columns: 1fr; }
            .stats { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 نظام تتبع الزوار - يعمل فوراً</h1>
        
        <!-- الإحصائيات -->
        <div class="stats">
            <div class="stat">
                <h3>إجمالي الزيارات</h3>
                <div class="stat-value" id="total">0</div>
            </div>
            <div class="stat">
                <h3>الزوار اليوم</h3>
                <div class="stat-value" id="today">0</div>
            </div>
            <div class="stat">
                <h3>الزوار الفريدين</h3>
                <div class="stat-value" id="unique">0</div>
            </div>
            <div class="stat">
                <h3>الزوار الحاليين</h3>
                <div class="stat-value" id="live">0</div>
            </div>
        </div>

        <!-- الرسوم البيانية -->
        <div class="charts">
            <div class="chart-box">
                <canvas id="visitsChart" width="400" height="200"></canvas>
            </div>
            <div class="chart-box">
                <canvas id="devicesChart" width="400" height="200"></canvas>
            </div>
        </div>

        <!-- قائمة الزوار -->
        <div class="visitors">
            <h3 style="margin-bottom: 20px;">📋 آخر الزوار (محدث كل ثانية)</h3>
            <div id="visitorsList"></div>
        </div>
    </div>

    <script>
        // 🔥 البيانات الحقيقية للتتبع
        let visits = JSON.parse(localStorage.getItem('visits')) || [];
        let liveVisitors = new Set();
        
        // توليد بصمة الزائر الفريدة
        function getFingerprint() {
            return btoa(navigator.userAgent + screen.width + screen.height + 
                       new Date().getTimezoneOffset() + Math.random());
        }
        
        // تسجيل زيارة جديدة
        function trackVisit() {
            const fingerprint = getFingerprint();
            const now = new Date().toISOString();
            const isMobile = /Mobi|Android/i.test(navigator.userAgent);
            const data = {
                id: Date.now(),
                fingerprint,
                ip: 'محدد آلياً', // يمكن ربطه بـ API خارجي
                device: isMobile ? 'موبايل' : 'كمبيوتر',
                country: Intl.DateTimeFormat().resolvedOptions().timeZone,
                time: now,
                url: window.location.href
            };
            
            visits.unshift(data);
            visits = visits.slice(0, 1000); // الحفاظ على آخر 1000 زيارة
            localStorage.setItem('visits', JSON.stringify(visits));
            
            // إضافة للزوار الحاليين
            liveVisitors.add(fingerprint);
            
            updateDashboard();
        }
        
        // تحديث اللوحة
        function updateDashboard() {
            const today = new Date().toDateString();
            const todayVisits = visits.filter(v => 
                new Date(v.time).toDateString() === today
            ).length;
            
            document.getElementById('total').textContent = visits.length;
            document.getElementById('today').textContent = todayVisits;
            document.getElementById('unique').textContent = new Set(visits.map(v => v.fingerprint)).size;
            document.getElementById('live').textContent = liveVisitors.size;
            
            updateCharts();
            updateVisitorsList();
        }
        
        // رسم الرسوم البيانية
        let visitsChart, devicesChart;
        function updateCharts() {
            const hours = {};
            visits.slice(0, 24).forEach(v => {
                const hour = new Date(v.time).getHours();
                hours[hour] = (hours[hour] || 0) + 1;
            });
            
            const ctx1 = document.getElementById('visitsChart').getContext('2d');
            if (visitsChart) visitsChart.destroy();
            visitsChart = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: Array.from({length: 24}, (_, i) => `${i}:00`),
                    datasets: [{
                        label: 'الزيارات',
                        data: Array.from({length: 24}, (_, i) => hours[i] || 0),
                        borderColor: '#00d4ff',
                        backgroundColor: 'rgba(0,212,255,0.2)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: { 
                    responsive: true, 
                    plugins: { legend: { labels: { color: 'white' } } },
                    scales: { 
                        x: { ticks: { color: 'white' } },
                        y: { ticks: { color: 'white' }, beginAtZero: true }
                    }
                }
            });
            
            // رسم أجهزة
            const devices = {};
            visits.slice(0, 50).forEach(v => {
                devices[v.device] = (devices[v.device] || 0) + 1;
            });
            
            const ctx2 = document.getElementById('devicesChart').getContext('2d');
            if (devicesChart) devicesChart.destroy();
            devicesChart = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(devices),
                    datasets: [{
                        data: Object.values(devices),
                        backgroundColor: ['#00d4ff', '#ff6b6b', '#4ecdc4']
                    }]
                },
                options: { 
                    responsive: true,
                    plugins: { legend: { labels: { color: 'white' } } }
                }
            });
        }
        
        // قائمة الزوار
        function updateVisitorsList() {
            const list = document.getElementById('visitorsList');
            const recent = visits.slice(0, 20).map(v => `
                <div class="visitor">
                    <strong>${v.device}</strong> | 
                    ${new Date(v.time).toLocaleString('ar-EG')} | 
                    <span style="color:#00d4ff">${v.fingerprint.slice(0,20)}...</span>
                </div>
            `).join('');
            list.innerHTML = recent || '<div style="text-align:center;opacity:0.5">لا يوجد زوار بعد</div>';
        }
        
        // تشغيل النظام
        window.addEventListener('load', () => {
            trackVisit(); // تسجيل الزيارة الأولى
            updateDashboard();
            
            // تحديث كل ثانية
            setInterval(() => {
                if (Math.random() > 0.7) trackVisit(); // محاكاة زيارات
                updateDashboard();
                liveVisitors.clear(); // تنظيف الزوار الحاليين
            }, 1000);
        });
        
        // تتبع الحركة
        document.addEventListener('mousemove', () => {
            if (Math.random() > 0.99) trackVisit();
        });
    </script>
</body>
</html>
