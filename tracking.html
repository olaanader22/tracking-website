<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 تتبع الزوار العالمي</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#1e3c72 0%,#2a5298 100%);color:white;min-height:100vh;padding:20px;}
        .container{max-width:1200px;margin:0 auto;}
        h1{text-align:center;margin-bottom:30px;font-size:2.5em;}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px;}
        .stat{background:rgba(255,255,255,0.1);padding:20px;border-radius:15px;text-align:center;backdrop-filter:blur(10px);}
        .stat h3{margin-bottom:10px;font-size:1.1em;}
        .stat-value{font-size:2.5em;font-weight:bold;color:#00d4ff;}
        .charts{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:30px;}
        .chart-box{background:rgba(255,255,255,0.1);padding:20px;border-radius:15px;}
        .visitors{background:rgba(255,255,255,0.1);padding:20px;border-radius:15px;}
        .visitor{padding:10px;margin:10px 0;background:rgba(255,255,255,0.05);border-radius:8px;}
        @media(max-width:768px){.charts,.stats{grid-template-columns:1fr;}}
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 تتبع الزوار العالمي <span id="status">جاري التحميل...</span></h1>
        <div class="stats">
            <div class="stat"><h3>إجمالي الزيارات</h3><div class="stat-value" id="total">0</div></div>
            <div class="stat"><h3>الزوار اليوم</h3><div class="stat-value" id="today">0</div></div>
            <div class="stat"><h3>الزوار الفريدين</h3><div class="stat-value" id="unique">0</div></div>
            <div class="stat"><h3>الزوار الحاليين</h3><div class="stat-value" id="live">0</div></div>
        </div>
        <div class="charts">
            <div class="chart-box"><canvas id="visitsChart"></canvas></div>
            <div class="chart-box"><canvas id="devicesChart"></canvas></div>
        </div>
        <div class="visitors">
            <h3>📋 آخر الزوار <small>(محدث كل 3 ثواني)</small></h3>
            <div id="visitorsList">جاري تحميل الزوار...</div>
        </div>
    </div>

    <script>
        let visits = [];
        let liveVisitors = new Set();
        
        // بصمة الزائر العالمية
        function getGlobalFingerprint(){
            return btoa(navigator.userAgent+screen.width+screen.height+navigator.language+Date.now());
        }
        
        // حفظ في localStorage + إرسال للخادم
        async function trackGlobalVisit(){
            const fingerprint = getGlobalFingerprint();
            const data = {
                id: Date.now(),
                fingerprint,
                device: /Android|iPhone/i.test(navigator.userAgent)?'📱 موبايل':'💻 كمبيوتر',
                country: navigator.language.split('-')[0],
                referrer: document.referrer,
                time: new Date().toISOString(),
                url: window.location.href
            };
            
            // حفظ محلي
            visits.unshift(data);
            visits = visits.slice(0,1000);
            localStorage.setItem('global_visits', JSON.stringify(visits));
            
            // إرسال للإنترنت (اختياري)
            try{
                await fetch('https://httpbin.org/post', {
                    method: 'POST',
                    body: JSON.stringify(data),
                    headers: {'Content-Type':'application/json'}
                });
            }catch(e){}
            
            liveVisitors.add(fingerprint);
            document.getElementById('status').textContent = `مرحباً زائر رقم ${visits.length}!`;
        }
        
        function updateDashboard(){
            const today = new Date().toDateString();
            const todayCount = visits.filter(v=>new Date(v.time).toDateString()===today).length;
            
            document.getElementById('total').textContent = visits.length.toLocaleString();
            document.getElementById('today').textContent = todayCount;
            document.getElementById('unique').textContent = new Set(visits.map(v=>v.fingerprint)).size;
            document.getElementById('live').textContent = liveVisitors.size;
            updateCharts();
            updateVisitorsList();
        }
        
        let visitsChart, devicesChart;
        function updateCharts(){
            const hours = {};
            visits.slice(0,24).forEach(v=>{
                const h = new Date(v.time).getHours();
                hours[h] = (hours[h]||0)+1;
            });
            
            const ctx1 = document.getElementById('visitsChart').getContext('2d');
            if(visitsChart) visitsChart.destroy();
            visitsChart = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: Array(24).fill().map((_,i)=>`${i}:00`),
                    datasets: [{label:'الزيارات',data: Array(24).fill().map((_,i)=>hours[i]||0),
                    borderColor:'#00d4ff',backgroundColor:'rgba(0,212,255,0.2)',tension:0.4,fill:true}]
                },
                options: {responsive:true,plugins:{legend:{labels:{color:'white'}}},
                scales:{x:{ticks:{color:'white'}},y:{ticks:{color:'white'},beginAtZero:true}}}
            });
            
            const devices = {};
            visits.slice(0,50).forEach(v=>devices[v.device]=(devices[v.device]||0)+1);
            
            const ctx2 = document.getElementById('devicesChart').getContext('2d');
            if(devicesChart) devicesChart.destroy();
            devicesChart = new Chart(ctx2, {
                type: 'doughnut',
                data: {labels: Object.keys(devices),datasets:[{data: Object.values(devices),
                backgroundColor:['#00d4ff','#ff6b6b','#4ecdc4']}]},
                options: {responsive:true,plugins:{legend:{labels:{color:'white'}}}}
            });
        }
        
        function updateVisitorsList(){
            const list = document.getElementById('visitorsList');
            const recent = visits.slice(0,15).map(v=>`
                <div class="visitor">
                    ${v.device} | ${new Date(v.time).toLocaleString('ar-EG')} | 
                    <small>${v.country} | ${v.fingerprint.slice(0,15)}...</small>
                </div>
            `).join('');
            list.innerHTML = recent || '<div style="opacity:0.5">لا زوار بعد 🤷‍♂️</div>';
        }
        
        // بداية التتبع العالمي
        window.addEventListener('load',()=>{
            // تحميل البيانات القديمة
            const saved = localStorage.getItem('global_visits');
            if(saved) visits = JSON.parse(saved);
            
            trackGlobalVisit();
            updateDashboard();
            
            // تحديث مستمر
            setInterval(()=>{
                trackGlobalVisit();
                updateDashboard();
                liveVisitors.clear();
            }, 3000);
        });
    </script>
</body>
</html>
